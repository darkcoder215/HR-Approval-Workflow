  :root {
    --font-sans:    'Thmanyah Sans', 'IBM Plex Sans Arabic', system-ui, sans-serif;
    --font-display: 'Thmanyah Serif Display', 'Thmanyah Serif Text', 'Amiri', serif;
    --font-text:    'Thmanyah Serif Text', 'Thmanyah Serif Display', serif;
    --font-mono:    'JetBrains Mono', ui-monospace, monospace;
    color-scheme: dark;
  }
  html, body {
    margin:0; padding:0;
    background: #000; color:#fff;
    font-family: var(--font-sans);
    font-feature-settings: "kern", "ss01";
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  *, *::before, *::after { box-sizing: border-box; }
  button, input, textarea { font-family: inherit; }
  a { color: inherit; }
  #root { min-height: 100vh; }
  ::selection { background: var(--color-accent, #EF4632); color:#fff; }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.14); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.28); }
