  :root {
    --font-sans:    'Thmanyah Sans', 'IBM Plex Sans Arabic', system-ui, sans-serif;

<!-- Tweakable defaults -->
<script>
window.TWEAKS = /*EDITMODE-BEGIN*/{
  "palette": "ember",
  "mode": "dark",
  "radius": "default",

  "typeScale": "thmanyah"
}/*EDITMODE-END*/;

// Resolve an asset path (e.g. 'assets/show-1.png') to its bundled blob URL.
// Falls back to the original path if unbundled (dev mode).
window.__asset = function(path) {
  if (!window.__resources) return path;
  var map = {
    'assets/show-1.png':'show1','assets/show-2.png':'show2','assets/show-3.png':'show3',
    'assets/show-4.png':'show4','assets/show-5.png':'show5','assets/show-6.png':'show6',
    'assets/show-7.png':'show7','assets/show-8.png':'show8','assets/doc-1.png':'doc1',
    'assets/hero-2.png':'hero2','assets/hero-3.png':'hero3'
  };
  var id = map[path];
  return (id && window.__resources[id]) || path;
};
</script>
